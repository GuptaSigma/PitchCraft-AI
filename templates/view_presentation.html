<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Presentation - PitchCraft AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f1f5f9;
        }
        
        /* Theme Color Variables */
        :root {
            --bg: 15, 23, 42;
            --text: 248, 250, 252;
            --accent: 99, 102, 241;
        }
        
        [data-theme="dialogue"] { --bg: 15, 23, 42; --text: 248, 250, 252; --accent: 99, 102, 241; }
        [data-theme="alien"] { --bg: 22, 163, 74; --text: 255, 255, 255; --accent: 34, 197, 94; }
        [data-theme="wine"] { --bg: 88, 28, 135; --text: 255, 255, 255; --accent: 168, 85, 247; }
        [data-theme="snowball"] { --bg: 248, 250, 252; --text: 15, 23, 42; --accent: 99, 102, 241; }
        [data-theme="petrol"] { --bg: 8, 47, 73; --text: 255, 255, 255; --accent: 14, 165, 233; }
        [data-theme="piano"] { --bg: 0, 0, 0; --text: 255, 255, 255; --accent: 255, 255, 255; }
        [data-theme="sunset"] { --bg: 255, 87, 34; --text: 255, 255, 255; --accent: 255, 152, 0; }
        [data-theme="midnight"] { --bg: 88, 28, 135; --text: 255, 255, 255; --accent: 168, 85, 247; }
        
        .slide-card {
            background: rgb(var(--bg));
            color: rgb(var(--text));
            border-radius: 16px;
            padding: 3rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }
        
        .slide-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="text-slate-800" data-theme="dialogue">

    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm" style="overflow: visible;">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center" style="overflow: visible;">
            <div class="flex items-center gap-4">
                <button onclick="window.location.href='/dashboard'" class="text-slate-600 hover:text-slate-900">
                    <i class="ph-bold ph-arrow-left text-xl"></i>
                </button>
                <div class="w-10 h-10 bg-gradient-to-br from-purple-600 to-purple-800 rounded-xl flex items-center justify-center">
                    <i class="ph-bold ph-presentation text-white text-lg"></i>
                </div>
                <div>
                    <h1 id="pres-title" class="font-bold text-lg text-slate-900">Loading...</h1>
                    <p class="text-xs text-slate-500">
                        <span id="slide-count">0</span> Slides • Theme: <span id="theme-label" class="font-semibold text-purple-600">Dialogue</span>
                    </p>
                </div>
            </div>
            
            <div class="flex items-center gap-3" style="overflow: visible;">
                <!-- Theme Dropdown -->
                <select id="theme-select" onchange="changeTheme(this.value)" class="px-4 py-2 border-2 border-purple-200 rounded-lg font-semibold text-purple-700 cursor-pointer hover:bg-purple-50 transition">
                    <option value="dialogue">🎨 Dialogue</option>
                    <option value="alien">👽 Alien</option>
                    <option value="wine">🍷 Wine</option>
                    <option value="snowball">❄️ Snowball</option>
                    <option value="petrol">⚙️ Petrol</option>
                    <option value="piano">🎹 Piano</option>
                    <option value="sunset">🌅 Sunset</option>
                    <option value="midnight">🌙 Midnight</option>
                </select>
                
                <!-- Edit Button -->
                <button id="edit-btn" onclick="toggleEdit()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg font-semibold flex items-center gap-2 transition">
                    <i class="ph-bold ph-pencil-simple"></i>
                    Edit
                </button>
                
                <!-- Export Dropdown Button -->
                <div class="relative inline-block">
                    <button id="export-btn" onclick="toggleExportDropdown(event)" class="px-5 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-bold flex items-center gap-2 shadow-lg transition">
                        <i class="ph-bold ph-download-simple"></i>
                        Export
                        <i class="ph-bold ph-caret-down text-xs"></i>
                    </button>
                    <div id="export-dropdown" class="hidden absolute right-0 mt-2 z-[99999] min-w-[14rem] bg-white rounded-xl shadow-xl border border-slate-200">
                        <div class="p-1">
                            <button onclick="exportPresentation('pptx')" class="w-full text-left px-4 py-3 hover:bg-orange-50 hover:text-orange-600 flex items-center gap-3 transition-colors border-b border-slate-100 rounded-t-lg">
                                <i class="ph-fill ph-file-ppt text-orange-500 text-2xl"></i>
                                <div>
                                    <div class="font-bold text-slate-800 text-sm">PowerPoint</div>
                                    <div class="text-xs text-slate-500">.pptx format</div>
                                </div>
                            </button>
                            <button onclick="exportPresentation('pdf')" class="w-full text-left px-4 py-3 hover:bg-red-50 hover:text-red-600 flex items-center gap-3 transition-colors border-b border-slate-100">
                                <i class="ph-fill ph-file-pdf text-red-600 text-2xl"></i>
                                <div>
                                    <div class="font-bold text-slate-800 text-sm">PDF</div>
                                    <div class="text-xs text-slate-500">.pdf format</div>
                                </div>
                            </button>
                            <button onclick="exportPresentation('docx')" class="w-full text-left px-4 py-3 hover:bg-blue-50 hover:text-blue-600 flex items-center gap-3 transition-colors border-b border-slate-100">
                                <i class="ph-fill ph-file-doc text-blue-600 text-2xl"></i>
                                <div>
                                    <div class="font-bold text-slate-800 text-sm">Word DOCX</div>
                                    <div class="text-xs text-slate-500">.docx format</div>
                                </div>
                            </button>
                            <button onclick="exportPresentation('doc')" class="w-full text-left px-4 py-3 hover:bg-blue-50 hover:text-blue-700 flex items-center gap-3 transition-colors rounded-b-lg">
                                <i class="ph-fill ph-file-text text-blue-500 text-2xl"></i>
                                <div>
                                    <div class="font-bold text-slate-800 text-sm">Word DOC</div>
                                    <div class="text-xs text-slate-500">.doc format</div>
                                </div>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-6 py-12">
        <div id="loading" class="text-center py-20">
            <div class="inline-block animate-spin w-12 h-12 border-4 border-purple-600 border-t-transparent rounded-full"></div>
            <p class="mt-4 text-slate-600 font-semibold">Loading presentation...</p>
        </div>
        
        <div id="slides-container" class="hidden space-y-8">
            <!-- Slides will be loaded here -->
        </div>
    </main>

    <script>
        let presId = null;
        let currentTheme = 'dialogue';
        let slidesData = [];

        // Themes mapping for display
        const themeNames = {
            dialogue: '🎨 Dialogue',
            alien: '👽 Alien',
            wine: '🍷 Wine',
            snowball: '❄️ Snowball',
            petrol: '⚙️ Petrol',
            piano: '🎹 Piano',
            sunset: '🌅 Sunset',
            midnight: '🌙 Midnight'
        };

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            presId = window.location.pathname.split('/').pop();
            console.log('Presentation ID:', presId);
            
            // Check if user is logged in
            const token = localStorage.getItem('token');
            if (!token) {
                console.warn('⚠️ No token found - redirecting to login');
                document.getElementById('loading').innerHTML = `
                    <div class="text-center py-20">
                        <i class="ph-bold ph-lock text-6xl text-purple-500 mb-4"></i>
                        <p class="text-purple-600 font-semibold mb-2">Authentication Required</p>
                        <p class="text-slate-500 text-sm mb-4">Please login to view this presentation</p>
                        <button onclick="window.location.href='/login'" class="px-6 py-3 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-bold">
                            Go to Login
                        </button>
                    </div>
                `;
                setTimeout(() => {
                    window.location.href = '/login?redirect=' + encodeURIComponent(window.location.pathname);
                }, 2000);
                return;
            }
            
            loadPresentation();
            
            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                const dropdown = document.getElementById('export-dropdown');
                const exportBtn = document.getElementById('export-btn');
                if (!exportBtn.contains(e.target) && !dropdown.contains(e.target)) {
                    dropdown.classList.add('hidden');
                }
            });
        });
        
        // Toggle export dropdown
        function toggleExportDropdown(e) {
            if (e) e.stopPropagation();
            const dropdown = document.getElementById('export-dropdown');
            
            if (!dropdown) {
                alert('Error: Dropdown not found!');
                return;
            }
            
            const isHidden = dropdown.classList.contains('hidden');

            if (isHidden) {
                dropdown.classList.remove('hidden');
            } else {
                dropdown.classList.add('hidden');
            }
        }
        
        // Export presentation in specified format
        function exportPresentation(format) {
            console.log(`📥 Exporting as ${format.toUpperCase()}`);
            const dropdown = document.getElementById('export-dropdown');
            dropdown.classList.add('hidden');
            
            // Show loading indicator
            const exportBtn = document.getElementById('export-btn');
            const originalContent = exportBtn.innerHTML;
            exportBtn.innerHTML = '<div class="inline-block animate-spin w-4 h-4 border-2 border-white border-t-transparent rounded-full"></div> Downloading...';
            exportBtn.disabled = true;
            
            // Start download
            const token = localStorage.getItem('token');
            window.location.href = `/api/presentations/${presId}/download/${format}?token=${token}`;
            
            // Reset button after delay
            setTimeout(() => {
                exportBtn.innerHTML = originalContent;
                exportBtn.disabled = false;
            }, 2000);
        }

        // Load presentation
        async function loadPresentation() {
            try {
                const token = localStorage.getItem('token');
                const headers = {
                    'Content-Type': 'application/json'
                };
                
                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }
                
                const res = await fetch(`/api/presentations/${presId}`, {
                    headers: headers
                });
                
                // Handle 401 - Unauthorized 
                if (res.status === 401) {
                    console.error('❌ Unauthorized - Invalid or expired token');
                    localStorage.removeItem('token');
                    document.getElementById('loading').innerHTML = `
                        <div class="text-center py-20">
                            <i class="ph-bold ph-warning-circle text-6xl text-red-500 mb-4"></i>
                            <p class="text-red-600 font-semibold mb-2">Session Expired</p>
                            <p class="text-slate-500 text-sm mb-4">Please login again</p>
                            <button onclick="window.location.href='/login'" class="px-6 py-3 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-bold">
                                Go to Login
                            </button>
                        </div>
                    `;
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                    return;
                }
                
                const data = await res.json();
                
                if (!res.ok || !data.success) {
                    throw new Error(data.error || 'Failed to load presentation');
                }
                
                const pres = data.presentation;
                
                console.log('✅ Loaded presentation:', pres.title);
                console.log('📊 Total slides:', pres.slides?.length || 0);
                console.log('🎨 Theme:', pres.theme);
                
                document.getElementById('pres-title').textContent = pres.title;
                document.getElementById('slide-count').textContent = pres.slides?.length || 0;
                
                currentTheme = pres.theme || 'dialogue';
                slidesData = pres.slides || [];
                
                // Apply theme
                document.body.setAttribute('data-theme', currentTheme);
                updateThemeUI(currentTheme);
                
                // Render slides as cards
                renderSlides();
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('slides-container').classList.remove('hidden');
                
            } catch (e) {
                console.error('Load error:', e);
                document.getElementById('loading').innerHTML = `
                    <div class="text-center py-20">
                        <i class="ph-bold ph-warning-circle text-6xl text-red-500 mb-4"></i>
                        <p class="text-red-600 font-semibold mb-2">Failed to load presentation</p>
                        <p class="text-slate-500 text-sm mb-4">${e.message}</p>
                        <button onclick="window.location.href='/dashboard'" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg">
                            Go to Dashboard
                        </button>
                    </div>
                `;
            }
        }

        // Render all slides as cards
        function renderSlides() {
            const container = document.getElementById('slides-container');
            
            if (slidesData.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20">
                        <i class="ph-bold ph-file-dashed text-6xl text-slate-400 mb-4"></i>
                        <p class="text-slate-500 font-semibold">No slides in this presentation</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = slidesData.map((slide, index) => `
                <div class="slide-card bg-white rounded-2xl shadow-md hover:shadow-xl transition-shadow p-8 border border-slate-200">
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-600 to-purple-800 flex items-center justify-center text-white font-bold">
                                ${index + 1}
                            </div>
                            <h2 class="text-2xl font-bold text-slate-900">${slide.title || 'Untitled Slide'}</h2>
                        </div>
                    </div>
                    <div class="prose max-w-none">
                        <div class="text-slate-700 leading-relaxed">
                            ${formatContent(slide.content || 'No content')}
                        </div>
                    </div>
                    ${slide.image ? `
                        <div class="mt-6">
                            <img src="${slide.image}" alt="Slide image" class="rounded-xl w-full max-h-96 object-cover shadow-md">
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // Format content (convert lists, etc.)
        function formatContent(content) {
            if (typeof content === 'string') {
                // Convert numbered lists
                content = content.replace(/^\d+\.\s+(.+)$/gm, '<li class="mb-2">$1</li>');
                // Convert bullet points
                content = content.replace(/^[-•*]\s+(.+)$/gm, '<li class="mb-2">$1</li>');
                // Wrap lists
                if (content.includes('<li>')) {
                    content = '<ul class="list-disc list-inside space-y-2 ml-2">' + content + '</ul>';
                } else {
                    // Convert line breaks for non-list content
                    content = content.replace(/\n/g, '<br>');
                }
            }
            return content;
        }

        // Change theme
        async function changeTheme(themeName) {
            if (themeName === currentTheme) return;
            
            console.log(`🎨 Changing theme: ${currentTheme} → ${themeName}`);
            
            const token = localStorage.getItem('token');
            
            try {
                const res = await fetch(`/api/presentations/${presId}/theme`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token || ''}`
                    },
                    body: JSON.stringify({ theme: themeName })
                });

                const data = await res.json();

                if (data.success) {
                    currentTheme = themeName;
                    document.body.setAttribute('data-theme', themeName);
                    updateThemeUI(themeName);
                    
                    console.log('✅ Theme changed successfully');
                } else {
                    throw new Error(data.error || 'Theme update failed');
                }
            } catch (e) {
                console.error('Theme update error:', e);
                alert('❌ Failed to update theme: ' + e.message);
            }
        }

        // Update theme UI (label and dropdown)
        function updateThemeUI(themeName) {
            // Update theme label
            const themeLabel = document.getElementById('theme-label');
            if (themeLabel) {
                themeLabel.textContent = themeName.charAt(0).toUpperCase() + themeName.slice(1);
            }
            
            // Update dropdown selection
            const themeSelect = document.getElementById('theme-select');
            if (themeSelect) {
                themeSelect.value = themeName;
            }
        }

        // Toggle edit mode - redirect to editor
        function toggleEdit() {
            window.location.href = `/editor/${presId}`;
        }
    </script>
</body>
</html>
